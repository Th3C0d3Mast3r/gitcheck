name: 'GitCheck Security Scanner'
description: 'Pre-merge CI/CD gate for malicious scripts, secrets, and dangerous logic.'
branding:
  icon: 'shield'
  color: 'blue'
authors: 'Th3C0d3Mast3r | Piyush123abc | Ananya-engg'
inputs:
  report_mode:
    description: '1: Always, 2: Not on merges, 3: Never'
    required: true
    default: '1'
  target:
    description: 'Optional: Specific file or directory to scan (scans diff if empty)'
    required: false
    default: ''

runs:
  using: 'docker'
  image: 'docker://dcodemaster/gitcheck:latest'
  args:
    - ${{ inputs.report_mode }}
    - ${{ inputs.target }}
